name: env-image

on:
  push:
    branches: [main]
    paths:
      - docker/Dockerfile
      - docker/entrypoint.sh
      - .github/workflows/env-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: MockaSort-Studio/actions/.github/actions/push-container@main
        with:
          image-name: a2t-mrv-env
          image-description: "CI runner environment for Hall automata — Elixir, PostgreSQL + PostGIS, Node.js"
          dockerfile: docker/Dockerfile
          context: docker
          token: ${{ secrets.GITHUB_TOKEN }}
