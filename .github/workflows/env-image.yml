name: env-image

on:
  push:
    branches: [main]
    paths:
      - docker/Dockerfile
      - docker/entrypoint.sh
      - .github/workflows/env-image.yml
  workflow_dispatch:

jobs:
  build-push:
    uses: MockaSort-Studio/actions/.github/workflows/release-container.yml@main
    with:
      image-name: a2t-mrv-env
      image-description: "CI runner environment for Hall automata — Elixir, PostgreSQL + PostGIS, Node.js"
      dockerfile: docker/Dockerfile
      context: docker
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
