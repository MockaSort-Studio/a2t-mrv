name: elixir-test

on:
  workflow_call:
    inputs:
      target_folder:
        description: Elixir project folder to test
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: devenv shell bash -- -e {0}
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        shell: bash
        run: nix profile add nixpkgs#devenv

      - name: Start services
        run: |
          devenv up -d
          until pg_isready; do sleep 1; done

      - name: Install dependencies
        run: cd ${{ inputs.target_folder }} && mix deps.get

      - name: Run tests
        run: cd ${{ inputs.target_folder }} && mix test --warnings-as-errors
